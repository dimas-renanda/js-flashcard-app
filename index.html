<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Flashcards</title>
<style>
  body{margin:0;font-family:sans-serif;background:#1a1a2e;color:#eee;display:flex;flex-direction:column;align-items:center;padding:2rem;min-height:100vh}
  h1{margin-bottom:.5rem}#progress{opacity:.6;margin-bottom:2rem;font-size:.9rem}
  .scene{width:400px;height:220px;perspective:1000px;cursor:pointer;margin-bottom:2rem}
  .card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;
    display:flex;align-items:center;justify-content:center;padding:1.5rem;box-sizing:border-box;font-size:1.2rem;text-align:center}
  .front{background:#16213e;border:2px solid #0f3460}
  .back{background:#0f3460;transform:rotateY(180deg)}
  .btns{display:flex;gap:1rem}
  button{padding:.75rem 1.5rem;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
  #know{background:#2ecc71;color:#fff}#dontknow{background:#e74c3c;color:#fff}#next{background:#3498db;color:#fff}
  .hint{opacity:.5;font-size:.8rem;margin-bottom:1rem}
</style>
</head>
<body>
<h1>🃏 Flashcards</h1>
<div id="progress">Card 1 of 5</div>
<div class="scene" onclick="flip()">
  <div class="card" id="card">
    <div class="face front" id="front"></div>
    <div class="face back" id="back"></div>
  </div>
</div>
<p class="hint">Click card to reveal answer</p>
<div class="btns">
  <button id="dontknow" onclick="mark(false)">✗ Don't Know</button>
  <button id="next" onclick="next()">→ Skip</button>
  <button id="know" onclick="mark(true)">✓ Got It</button>
</div>
<script>
const cards=[
  {q:"What is the time complexity of binary search?",a:"O(log n)"},
  {q:"What does CSS stand for?",a:"Cascading Style Sheets"},
  {q:"What is a closure in JavaScript?",a:"A function that retains access to its outer scope even after the outer function has returned"},
  {q:"What HTTP status code means 'Not Found'?",a:"404"},
  {q:"What is the difference between == and === in JavaScript?",a:"== checks value only (with coercion), === checks value AND type (strict equality)"}
];
let idx=0,score=0,flipped=false;
function show(){
  const c=cards[idx];
  document.getElementById('front').textContent=c.q;
  document.getElementById('back').textContent=c.a;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('progress').textContent=`Card ${idx+1} of ${cards.length} | Score: ${score}`;
  flipped=false;
}
function flip(){document.getElementById('card').classList.toggle('flipped');flipped=true}
function next(){idx=(idx+1)%cards.length;show()}
function mark(knew){if(knew)score++;next()}
show();
</script>
</body></html>
